<html>

<head>
    <title>OpenGlobus - Earth planet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../external/og/lib/og.css" type="text/css"/>
</head>

<style>
    .buttonContainer {
        position: absolute;
        top: 10px;
        left: 10px;
    }

    .btn {
        float: left;
        padding: 5px;
        margin: 5px;
    }

    #chkShadeMode {
        position: absolute;
        top: 60px;
        left: 10px;
        color: white;
    }

    #chkShadeMode div {
        float: left;
    }

    #chkShadeMode input {
        float: left;
    }
</style>

<body>
<div id="globus" style="width:100%;height:100%"></div>
<div class="buttonContainer">
    <button id="btnActivate" class="btn">Activate</button>
    <button id="btnStop" class="btn">Stop</button>
    <button id="btnDeactivate" class="btn">Deactivate</button>
</div>
<div id="chkShadeMode">
    <input type="checkbox" checked/>
    <div>Shade mode (0/1)</div>
</div>
    <script type="module" id="og-sandbox-script">
    'use strict';

    import {
        Globe,
        GlobusRgbTerrain,
        XYZ
    } from "../../external/og/lib/og.es.js";

    document.getElementById("btnActivate").onclick = function () {
        globus.sun.activate();
    };

    document.getElementById("btnStop").onclick = function () {
        globus.sun.stop();
    };

    document.getElementById("btnDeactivate").onclick = function () {
        globus.sun.deactivate();
    };

    document.querySelector("#chkShadeMode input").onclick = function () {
        globus.planet.shadeMode = this.checked ? 1 : 0;
    };

    var osm = new XYZ("OpenStreetMap", {
        isBaseLayer: true,
        url: "//{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        visibility: true,
        attribution: 'Data @ OpenStreetMap contributors, ODbL'
    });


    var globus = new Globe({
        target: "globus",
        name: "Earth",
        terrain: new GlobusRgbTerrain(),
        layers: [osm],
        sun: {
            active: false
        },
        resourcesSrc: "../../external/og/lib/res",
        fontsSrc: "../../external/og/lib/res/fonts"
    });
    
</script>
</body>

</html>
