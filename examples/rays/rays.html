<head>
    <title>OpenGlobus - Earth planet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../external/og/lib/og.css" type="text/css" />
</head>
<body>
    <div id="globus" style="width:100%;height:100%"></div>
    <script type="module" id="og-sandbox-script">
import {
    wgs84,
    Globe,
    Entity,
    GlobusRgbTerrain,
    XYZ,
    LonLat,
    Vector
} from "../../external/og/lib/og.es.js";

var osm = new XYZ("OpenStreetMap", {
    isBaseLayer: true,
    url: "//{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    visibility: true,
    attribution: "Data @ OpenStreetMap contributors, ODbL"
});

//ellipsoid with earth dimensions
let ellipsoid = wgs84;

const RAY_COUNT = 5000;
const START_HEIGHT = 0;
const MIN_END_HEIGHT = 100000;
const MAX_END_HEIGHT = 2000000;

function randomInRange(min, max) {
    return min + Math.random() * (max - min);
}

function randomLatDeg() {
    const u = Math.random() * 2 - 1;
    return Math.asin(u) * 180 / Math.PI;
}

function randomColor(alpha) {
    const r = Math.floor(Math.random() * 256);
    const g = Math.floor(Math.random() * 256);
    const b = Math.floor(Math.random() * 256);
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

const rays = [];

for (let i = 0; i < RAY_COUNT; i++) {
    const lon = randomInRange(-180, 180);
    const lat = randomLatDeg();
    const endHeight = randomInRange(MIN_END_HEIGHT, MAX_END_HEIGHT);
    const alpha = randomInRange(0.2, 0.55);

    const startLonLat = new LonLat(lon, lat, START_HEIGHT);
    const endLonLat = new LonLat(lon, lat, endHeight);

    rays.push(new Entity({
        ray: {
            startPosition: ellipsoid.lonLatToCartesian(startLonLat),
            endPosition: ellipsoid.lonLatToCartesian(endLonLat),
            startColor: randomColor(alpha),
            endColor: randomColor(alpha),
            thickness: randomInRange(2.0, 12.0)
        }
    }));
}

//polygonOffsetUnits is needed to hide rays behind globe
let rayLayer = new Vector("rays", {polygonOffsetUnits: 0});

//add entities containing the rays to the layer
rayLayer.addEntities(rays);

var globus = new Globe({
    target: "globus",
    name: "Earth",
    terrain: new GlobusRgbTerrain(),
    layers: [osm, rayLayer],
    sun: {
        active: true
    },
    resourcesSrc: "../../external/og/lib/res",
    fontsSrc: "../../external/og/lib/res/fonts"
});

window.globus = globus;

	</script>
</body>
</html>
