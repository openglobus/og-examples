6.4179220615,-4108083.610424449],[-4854554.348363584,357294.3766015385,-4108194.053668048],[-4854476.692392364,358368.02824288956,-4108257.1674142084],[-4854613.252869683,358349.5858013065,-4108095.8049336085],[-4854691.18657695,358296.28804107953,-4108003.5305681434],[-4854751.506007221,358215.76825100346,-4107947.789173229],[-4854789.779530697,358107.5996786142,-4107910.1298407377],[-4854439.814143027,358677.40142360947,-4108294.5084072305],[-4854524.966116139,358656.91698788805,-4108187.2541961684],[-4854503.901751875,358857.85137968353,-4108189.382427381],[-4854347.508702947,358698.52928720193,-4108404.6578706293],[-4854739.809973815,358758.08291100047,-4107939.7690394935],[-4854676.657102718,358832.02307012724,-4108004.093810074],[-4854809.230958223,358699.343457406,-4107862.389740355],[-4854899.928876096,359017.420177798,-4107705.853926272],[-4854920.839445946,358792.5636533355,-4107705.730430983],[-4854812.101236127,359033.78474229184,-4107820.1772029777],[-4854744.791805199,359102.62529343757,-4107896.6952135973],[-4854872.706394553,359354.9117361612,-4107687.9375599865],[-4854772.8267507125,359354.94131567335,-4107814.30820964],[-4854957.569705312,359652.80628416786,-4107518.057595961],[-4854523.216632611,359655.23555211554,-4108071.996286266],[-4854595.442917408,360123.1307163753,-4107906.8338031415],[-4854285.746661118,358763.31841686956,-4108481.6199336774],[-4854216.69989038,358820.9835311792,-4108565.455717931],[-4854204.452649689,358965.8816960282,-4108591.172658869],[-4854141.653581776,359029.5973271561,-4108670.7512582326],[-4854076.007571988,359097.91892570164,-4108758.1845464394],[-4854048.821906799,359217.0184989214,-4108803.508030019],[-4853977.12046162,359322.01750284975,-4108909.829949795],[-4854202.374549322,358518.610312475,-4108576.8826004583],[-4854120.876353528,358606.1802173087,-4108691.4015359953],[-4854062.343476947,358706.08131264796,-4108749.948544368],[-4854025.879787825,358844.49338678137,-4108822.4412492192],[-4853916.908624074,359116.5445579108,-4108974.5917625553],[-4853863.357054592,359248.29577846127,-4109047.832542393],[-4853945.474520852,359469.77673042763,-4108921.7813838185],[-4853892.327997589,359620.4013879005,-4108979.089629548],[-4853852.360684857,359734.6823174386,-4109021.795268769],[-4853784.544091918,359797.78230235924,-4109101.4714647415],[-4853704.444446738,359844.20846428996,-4109188.4988983306],[-4853804.484544772,360248.9492807367,-4108973.7767852694],[-4853932.64840732,360563.19677369646,-4108733.6988274497],[-4854058.459449975,360451.306232523,-4108555.5583479595],[-4855103.651399463,359106.6358571526,-4107410.5648528985],[-4856379.031175402,356857.6756779849,-4106178.2084837984],[-4856010.093947964,357094.411372415,-4106597.7070065965],[-4855526.509803837,357793.9773739894,-4107081.5978620225],[-4855132.112191024,358695.4280382828,-4107446.9793661595],[-4854357.903783221,358449.9099165765,-4108388.3245131527]]');

    const objectsLayer = new Vector("SkyBox objects", {
        scaleByDistance: [1, 1, 1]
    });

    const globus = new Globe({
        target: "earth",
        name: "Earth",
        terrain: new GlobusRgbTerrain(),
        layers: [new Bing(), objectsLayer],
        atmosphereEnabled: true,
        resourcesSrc: "../../external/og/lib/res",
    });

    const planet = globus.planet;

    globus.planet.addControl(new control.EntityEditor());

    function setInitialCamera() {
        const lookCartesian = planet.ellipsoid.lonLatToCartesian(CAMERA_LOOK_LONLAT);
        const up = planet.ellipsoid.getSurfaceNormal3v(CAMERA_EYE);
        planet.camera.set(CAMERA_EYE, lookCartesian, up);
        planet.camera.update();
    }

    function setTime() {
        const clock = planet.renderer.handler.defaultClock;
        clock.setDate(SUNSET_UTC);
        clock.stop();
        globus.sun.stop();
    }

    let turbObjects = null;
    const rotors = [];

    function createTurbineEntity(position) {
        if (!turbObjects || turbObjects.length === 0) return null;

        const rootName = turbObjects[0].name || "root";

        const rootEntity = new Entity({
            ...position,
            independentPicking: true,
            scale: 2.3,
            yaw: -70 * Math.PI / 180,
            geoObject: {
                tag: `turb:${rootName}:0`,
                object3d: turbObjects[0]
            }
        });

        for (let i = 1; i < turbObjects.length; i++) {
            const name = turbObjects[i].name || `${i}`;
            const isRotor = name.includes("Cylinder.001");
            const child = new Entity({
                cartesian: isRotor ? [0.0174005208, 25.983552548759953, 0.781180690023954] : [0, 0, 0],
                relativePosition: true,
                independentPicking: true,
                geoObject: {
                    tag: `turb:${name}:${i}`,
                    object3d: turbObjects[i]
                }
            });

            if (isRotor) {
                const phase = Math.random() * Math.PI * 2;
                child.setRoll(phase);
                rotors.push({entity: child, phase});
            }

            rootEntity.appendChild(child);
        }

        return rootEntity;
    }

    function addTurbinesByCartesianList() {
        for (let i = 0; i < TURBINE_CARTESIANS.length; i++) {
            const entity = createTurbineEntity({cartesian: TURBINE_CARTESIANS[i]});
            if (entity) {
                objectsLayer.add(entity);
            }
        }
    }

    setInitialCamera();
    setTime();

    Gltf.loadGlb("./turb.glb")
        .then((gltf) => {
            turbObjects = gltf.getObjects3d();
            addTurbinesByCartesianList();
        })
        .catch((error) => {
            console.error("Cannot load turb.glb", error);
        });

    planet.renderer.events.on("lclick", (mouseState) => {
        if (!planet.renderer.events.isKeyPressed(input.KEY_CTRL)) return;

        if (!turbObjects || turbObjects.length === 0) return;

        const lonLat = planet.getLonLatFromPixelTerrain(mouseState.pos);

        if (!lonLat) return;

        const entity = createTurbineEntity({lonlat: lonLat});
        if (entity) {
            objectsLayer.add(entity);
        }
    });

    let frame = 0;
    planet.renderer.events.on("draw", () => {
        frame++;
        for (let i = 0; i < rotors.length; i++) {
            rotors[i].entity.setRoll(rotors[i].phase + frame * ROTATION_SPEED);
        }
    });
</script>
