<html>

<head>
    <title>OpenGlobus - Earth planet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../external/og/lib/og.css" type="text/css" />
</head>

<body>
    <div id="globus" style="width:100%;height:100%"></div>
    <script type="module" id="og-sandbox-script">

        'use strict';

        import {
            Entity,
            Globe,
            GlobusRgbTerrain,
            XYZ,
            Vector,
            math,
            LonLat
        } from "../../external/og/lib/og.es.js";


        const osm = new XYZ("OpenStreetMap", {
            specular: [0.0003, 0.00012, 0.00001],
            shininess: 20,
            diffuse: [0.89, 0.9, 0.83],
            isBaseLayer: true,
            url: "//{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
            visibility: true,
            attribution: 'Data @ OpenStreetMap contributors, ODbL'
        });

        const pointLayer = new Vector("points", {
            relativeToGround: true,
            visibility: true,
            polygonOffsetUnits: -5,
        });

        const globe = new Globe({
            target: "globus",
            name: "Earth",
            terrain: new GlobusRgbTerrain(),
            layers: [osm, pointLayer],
            resourcesSrc: "../../external/og/lib/res",
            fontsSrc: "../../external/og/lib/res/fonts"
        });

        function createCircle(ellipsoid, center, radius = 300) {
            let circleCoords = [];
            for (let i = 0; i < 360; i += 5) {
                circleCoords.push(ellipsoid.getGreatCircleDestination(center, i, radius));
            }
            return circleCoords;
        };

        function createCircleEntities(num = 80) {
            let entities = [];
            let ell = globe.planet.ellipsoid;
            for (let i = 0; i < num; i++) {
                let center = new LonLat(math.random(8.08, 8.31), math.random(46.7, 46.8));
                let circle = createCircle(ell, center, math.random(100, 1000));
                let color = [math.random(), math.random(), math.random()];
                entities.push(new Entity({
                    polyline: {
                        pathLonLat: [circle],
                        pathColors: [[[color[0], color[1], color[2], 1.0]]],
                        thickness: 5.3,
                        isClosed: true
                    }
                }));
            }

            return entities;
        }

        const circleEntities = createCircleEntities();
        pointLayer.addEntities(circleEntities);

        const defaultThickness = 5.3;
        const hoverThickness = 10;
        let hoveredCircle = null;

        pointLayer.events.on("mouseenter", function (e) {
            e.renderer.handler.canvas.style.cursor = "pointer";
            if (hoveredCircle && hoveredCircle !== e.pickingObject) {
                hoveredCircle.polyline?.setThickness(defaultThickness);
            }
            e.pickingObject?.polyline?.setThickness(hoverThickness);
            hoveredCircle = e.pickingObject || null;
        });

        pointLayer.events.on("mouseleave", function (e) {
            e.renderer.handler.canvas.style.cursor = "default";
            const circle = e.pickingObject || hoveredCircle;
            circle?.polyline?.setThickness(defaultThickness);
            hoveredCircle = null;
        });

        globe.planet.viewExtentArr([8.08, 46.72, 8.31, 46.75]);

    </script>
</body>

</html>
