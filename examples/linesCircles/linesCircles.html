<html>

<head>
    <title>GeoObject example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../external/og/lib/og.css" type="text/css"/>
</head>

<body>
<div id="earth" style="width:100%;height:100%"></div>
<script type="module" id="og-sandbox-script">
    "use strict";

    import {
        Entity,
        Globe,
        EmptyTerrain,
        Bing,
        Object3d,
        LonLat,
        Vector,
        math
    } from "../../external/og/lib/og.es.js";

    // Coordinates to show on the map
    let coords = [
        [42.86, 10.385],
        [8.74, 40.39],
        [15.23, 21.62],
        [4.77, 13.36]
    ];

    const pointerSphere = Object3d.createCylinder(1, 1, 0.3, 16, 16);


    let poi = new Vector("LinesCircles", {
        scaleByDistance: [1.0, math.MAX32, 1.0],
        relativeToGround: false,
        shadeMode: 0,
        polygonOffsetUnits: -1200
    });

    poi.events.on("mouseleave", function (e) {
        e.pickingObject.geoObject.setColorHTML("#00c846");
    });

    poi.events.on("mouseenter", function (e) {
        e.pickingObject.geoObject.setColorHTML("#ffd400");
    });

    let pathEntity = new Entity({
        polyline: {
            thickness: 12,
            color: "#2d78ff",
        }
    });

    let path = new Vector("Path", {
        pickingEnabled: false,
        relativeToGround: false,
        entities: [pathEntity],
        polygonOffsetUnits: -1000,
    });

    let globus = new Globe({
        target: "earth",
        name: "Earth",
        layers: [new Bing(), poi, path],
        terrain: new EmptyTerrain(),
        atmosphereEnabled: true,
        resourcesSrc: "../../external/og/lib/res",
        fontsSrc: "../../external/og/lib/res/fonts"
    });

    let poiArr = [];
    let pathArr = [];

    for (let i = 0; i < coords.length; i++) {

        let ci = coords[i];

        if (i < coords.length - 1) {
            pathArr.push(getPath(
                globus.planet.ellipsoid,
                new LonLat(coords[i][0], coords[i][1]),
                new LonLat(coords[i + 1][0], coords[i + 1][1])
            ));
        }

        poiArr.push(new Entity({
            lonlat: new LonLat(ci[0], ci[1], 0),
            scale: 0.015,
            geoObject: {
                color: "#00c846",
                instanced: true,
                tag: "poi",
                object3d: pointerSphere
            }
        }));
    }

    poi.setEntities(poiArr);

    pathEntity.polyline.setPath3v(pathArr);

    function getPath(ell, start, end) {
        const POINTS_NUMBER = 70;

        let {distance, initialAzimuth} = ell.inverse(start, end);
        let path = [];

        for (let i = 0; i <= POINTS_NUMBER; i++) {
            let p = ell.getGreatCircleDestination(start, initialAzimuth, distance * i / POINTS_NUMBER);
            p.height = 0;
            let cn = ell.lonLatToCartesian(p);
            // bugfix with polylines on the edge
            if (i === 0 || i === POINTS_NUMBER) {
                path.push(cn);
            }
            path.push(cn);
        }

        return path;
    }

</script>
</body>

</html>
